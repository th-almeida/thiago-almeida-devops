name: Deploy Blue-Green

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Tag da imagem Docker para o ambiente Green
        required: true
        default: "0.0.2"

env:
  IMAGE_NAME: thiago-almeida-devops

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}

      - name: Render manifests
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          APP_HOST: gremio.local
        run: |
          chmod +x k8s/render.sh
          ./k8s/render.sh

      - name: Apply Blue environment
        run: |
          kubectl apply -f k8s/rendered/namespace.yaml
          kubectl apply -f k8s/rendered/blue-green/deployment-blue.yaml
          kubectl apply -f k8s/rendered/blue-green/service-router.yaml

      - name: Deploy to Green environment
        id: deploy_green
        run: |
          kubectl apply -f k8s/rendered/blue-green/deployment-green.yaml
          kubectl set image deployment/app-satc-green \
            thiago-almeida-devops=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
            -n "${{ vars.K8S_NAMESPACE }}"
          kubectl rollout status deployment/app-satc-green -n "${{ vars.K8S_NAMESPACE }}" --timeout=3m

      - name: Switch traffic to Green
        if: success()
        run: |
          kubectl patch service app-satc-traffic-router -n "${{ vars.K8S_NAMESPACE }}" \
            -p '{"spec":{"selector":{"app":"satc","version":"green"}}}'

      - name: Emergency rollback to Blue
        if: failure()
        run: |
          kubectl patch service app-satc-traffic-router -n "${{ vars.K8S_NAMESPACE }}" \
            -p '{"spec":{"selector":{"app":"satc","version":"blue"}}}'
