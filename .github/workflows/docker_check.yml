name: Docker Image Check

on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: thiago-almeida-devops
  IMAGE_TAG: "0.0.2"

jobs:
  docker_check:
    runs-on: ubuntu-latest
    # Chaves reais vêm dos secrets (crie o projeto no SonarCloud antes e copie Organization + Project key)
    env:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Login into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: docker build --pull -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        env:
          TRIVY_MEDIUM_MAX: 50
        run: |
          if [ -f trivy-results.json ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)
            echo "Quantidade de vulnerabilidades médias: $VULN_COUNT (limite para bloquear: ${TRIVY_MEDIUM_MAX})"

            if [ "$VULN_COUNT" -ge "$TRIVY_MEDIUM_MAX" ]; then
              echo "Pipeline bloqueada: ${TRIVY_MEDIUM_MAX} ou mais vulnerabilidades médias encontradas."
              exit 1
            fi
          else
            echo "Arquivo de resultados do Trivy não encontrado."
            exit 1
          fi

      - name: Falhar se houver mais de 2 vulnerabilidades médias (SonarCloud)
        run: |
          COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&severities=MAJOR&resolved=false&ps=1" \
            | jq '.total')

          echo "Quantidade de issues de vulnerabilidade MAJOR no Sonar: $COUNT"

          if [ "$COUNT" -gt 40 ]; then
            echo "Pipeline bloqueada: mais de 40 vulnerabilidades médias encontradas (Sonar)."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
