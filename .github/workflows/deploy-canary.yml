name: Deploy Canary

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Tag da imagem Docker para o canary
        required: true
        default: "0.0.2"

env:
  IMAGE_NAME: thiago-almeida-devops

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}

      - name: Render manifests
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          APP_HOST: gremio.local
        run: |
          chmod +x k8s/render.sh
          ./k8s/render.sh

      - name: Apply stable stack
        run: |
          kubectl apply -f k8s/rendered/namespace.yaml
          kubectl apply -f k8s/rendered/canary/deployment-stable.yaml
          kubectl apply -f k8s/rendered/canary/service-stable.yaml
          kubectl apply -f k8s/rendered/canary/ingress-stable.yaml

      - name: Deploy Canary (10% traffic)
        id: deploy_canary
        run: |
          kubectl apply -f k8s/rendered/canary/deployment-canary.yaml
          kubectl apply -f k8s/rendered/canary/service-canary.yaml
          kubectl apply -f k8s/rendered/canary/ingress-canary.yaml
          kubectl set image deployment/app-satc-canary \
            thiago-almeida-devops=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
            -n "${{ vars.K8S_NAMESPACE }}"
          kubectl rollout status deployment/app-satc-canary -n "${{ vars.K8S_NAMESPACE }}" --timeout=3m

      - name: Wait and analyze metrics
        run: sleep 60

      - name: Promote Canary to 100%
        if: success()
        run: |
          kubectl set image deployment/app-satc \
            thiago-almeida-devops=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
            -n "${{ vars.K8S_NAMESPACE }}"
          kubectl rollout status deployment/app-satc -n "${{ vars.K8S_NAMESPACE }}" --timeout=5m
          kubectl delete ingress app-satc-ingress-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found
          kubectl delete deployment app-satc-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found
          kubectl delete service app-satc-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found

      - name: Remove Canary on failure
        if: failure()
        run: |
          kubectl delete ingress app-satc-ingress-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found
          kubectl delete deployment app-satc-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found
          kubectl delete service app-satc-canary -n "${{ vars.K8S_NAMESPACE }}" --ignore-not-found
